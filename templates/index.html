<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Titan</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Caesar+Dressing&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0d0d12;
            --surface: #15151d;
            --hover: #1c1c26;
            --border: #262630;
            --text: #e8e8ed;
            --text-secondary: #9898a8;
            --text-muted: #5c5c6e;
            --accent: #6c5ce7;
            --accent-hover: #7d6ff0;
            --bubble-user: #6c5ce7;
            --bubble-assistant: #1e1e28;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
            justify-content: center;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        #starfield {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            opacity: 0.7;
        }

        .app-container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 720px;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        .header {
            padding: 24px 24px 0;
            text-align: center;
            flex-shrink: 0;
            animation: fadeDown 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
            transform: translateY(-30px);
        }

        @keyframes fadeDown {
            to { opacity: 1; transform: translateY(0); }
        }

        .header h1 {
            font-family: 'Caesar Dressing', cursive;
            font-size: 38px;
            font-weight: 400;
            letter-spacing: 4px;
            color: var(--text);
            line-height: 1;
        }

        .header .subtitle {
            font-size: 10px;
            color: var(--text-muted);
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-top: 6px;
        }

        /* Chat area */
        .chat-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px 16px;
            display: flex;
            flex-direction: column;
            gap: 4px;
            scroll-behavior: smooth;
            overscroll-behavior: contain;
            scrollbar-width: none;
        }

        .chat-area::-webkit-scrollbar {
            display: none;
        }

        .message-row {
            display: flex;
            margin-bottom: 4px;
            animation: messageIn 0.35s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .message-row.user { justify-content: flex-end; }
        .message-row.assistant { justify-content: flex-start; }
        .message-row.system { justify-content: center; }

        @keyframes messageIn {
            from { opacity: 0; transform: translateY(10px) scale(0.97); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .bubble-wrapper {
            max-width: 78%;
            display: flex;
            flex-direction: column;
        }

        .message-row.user .bubble-wrapper { align-items: flex-end; }
        .message-row.assistant .bubble-wrapper { align-items: flex-start; }

        .bubble {
            padding: 10px 14px;
            font-size: 14px;
            line-height: 1.45;
            word-wrap: break-word;
            display: inline-block;
        }

        .message-row.user .bubble {
            background: var(--bubble-user);
            color: #fff;
            border-radius: 18px 18px 4px 18px;
        }

        .message-row.assistant .bubble {
            background: var(--bubble-assistant);
            color: var(--text);
            border-radius: 18px 18px 18px 4px;
            border: 1px solid rgba(255, 255, 255, 0.06);
        }

        .message-row.system .bubble,
        .message-row.error .bubble {
            background: transparent;
            font-size: 11px;
            padding: 4px 10px;
            border-radius: 12px;
            text-align: center;
            border: none;
            color: var(--text-muted);
        }

        .message-row.error .bubble {
            color: #ef4444;
            border: 1px solid rgba(239, 68, 68, 0.2);
        }

        .bubble-time {
            font-size: 10px;
            color: var(--text-muted);
            margin-top: 2px;
            padding: 0 4px;
            opacity: 0;
            transform: translateY(-4px);
            transition: all 0.3s ease;
        }

        .message-row.user .bubble-time { text-align: right; }
        .message-row.assistant .bubble-time { text-align: left; }

        .message-row:hover .bubble-time {
            opacity: 0.6;
            transform: translateY(0);
        }

        .time-divider {
            text-align: center;
            padding: 12px 0 8px;
            font-size: 10px;
            color: var(--text-muted);
            letter-spacing: 1px;
            opacity: 0.5;
            animation: messageIn 0.3s ease;
        }

        /* Orb */
        .orb-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 16px 0 0;
            flex-shrink: 0;
        }

        .orb-wrapper {
            position: relative;
            width: 100px;
            height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .orb-ring {
            position: absolute;
            border-radius: 50%;
            border: 1px solid var(--border);
            animation: ringPulse 4s ease-in-out infinite;
        }
        .orb-ring:nth-child(1) { width: 100%; height: 100%; animation-delay: 0s; }
        .orb-ring:nth-child(2) { width: 80%; height: 80%; animation-delay: 0.6s; }
        .orb-ring:nth-child(3) { width: 60%; height: 60%; animation-delay: 1.2s; }

        @keyframes ringPulse {
            0%, 100% { border-color: var(--border); }
            50% { border-color: rgba(108, 92, 231, 0.25); }
        }

        .orb {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            background: radial-gradient(circle at 40% 35%, rgba(108, 92, 231, 0.15), transparent 70%);
            border: 1.5px solid rgba(108, 92, 231, 0.25);
            cursor: pointer;
            position: relative;
            z-index: 2;
            transition: all 0.25s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        .orb:hover {
            border-color: rgba(108, 92, 231, 0.5);
            box-shadow: 0 0 40px rgba(108, 92, 231, 0.1);
        }

        .orb:active {
            transform: scale(0.93);
            transition: transform 0.1s ease;
        }

        .orb.active {
            border-color: var(--accent);
            animation: orbBreathe 1.8s ease-in-out infinite;
        }

        @keyframes orbBreathe {
            0%, 100% { 
                box-shadow: 0 0 50px rgba(108, 92, 231, 0.15), inset 0 0 30px rgba(108, 92, 231, 0.05); 
            }
            50% { 
                box-shadow: 0 0 90px rgba(108, 92, 231, 0.3), inset 0 0 60px rgba(108, 92, 231, 0.12); 
            }
        }

        .orb-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: var(--accent);
            box-shadow: 0 0 16px rgba(108, 92, 231, 0.5);
            transition: all 0.3s ease;
        }

        .orb.active .orb-dot {
            width: 11px;
            height: 11px;
            animation: dotPulse 0.7s ease-in-out infinite;
        }

        @keyframes dotPulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.5); opacity: 0.5; }
        }

        .orb-label {
            font-size: 10px;
            letter-spacing: 3px;
            color: var(--text-muted);
            text-transform: uppercase;
            margin-top: 10px;
            transition: color 0.3s;
        }

        .orb-label.active { color: var(--accent); }

        .orb-sublabel {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 3px;
            min-height: 18px;
            transition: color 0.3s;
        }

        .orb-sublabel.alert { color: var(--accent); }

        /* Audio meter */
        .meter {
            width: 140px;
            height: 2px;
            background: var(--border);
            border-radius: 2px;
            margin-top: 10px;
            overflow: hidden;
        }

        .meter-fill {
            height: 100%;
            width: 0%;
            background: var(--accent);
            border-radius: 2px;
            transition: width 0.06s linear;
        }

        /* Speaking indicator */
        .speaking-indicator {
            font-size: 10px;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--accent);
            opacity: 0;
            transition: opacity 0.4s ease;
            margin-top: 6px;
            min-height: 16px;
        }

        .speaking-indicator.active {
            animation: breatheText 1.8s ease-in-out infinite;
        }

        @keyframes breatheText {
            0%, 100% { opacity: 0.35; }
            50% { opacity: 1; }
        }

        /* Quick actions */
        .quick-actions {
            display: flex;
            gap: 8px;
            padding: 8px 24px 14px;
            justify-content: center;
            flex-wrap: wrap;
            flex-shrink: 0;
        }

        .quick-btn {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 6px 14px;
            font-size: 11px;
            font-family: inherit;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s ease;
            letter-spacing: 0.3px;
            white-space: nowrap;
        }

        .quick-btn:hover {
            background: var(--hover);
            border-color: rgba(108, 92, 231, 0.25);
            color: var(--text);
        }

        /* Input */
        .input-area {
            display: flex;
            gap: 8px;
            padding: 10px 24px 20px;
            flex-shrink: 0;
            align-items: center;
        }

        .input-area input {
            flex: 1;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 22px;
            padding: 10px 18px;
            color: var(--text);
            font-size: 13px;
            font-family: inherit;
            outline: none;
            transition: all 0.2s ease;
        }

        .input-area input:focus {
            border-color: rgba(108, 92, 231, 0.35);
            box-shadow: 0 0 0 3px rgba(108, 92, 231, 0.06);
        }

        .input-area input::placeholder {
            color: var(--text-muted);
        }

        .btn-send {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            background: var(--accent);
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            flex-shrink: 0;
            padding: 0;
        }

        .btn-send:hover {
            background: var(--accent-hover);
            transform: scale(1.05);
        }

        .btn-send:active {
            transform: scale(0.92);
        }

        .btn-send:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            transform: none;
        }

        .btn-send svg {
            width: 16px;
            height: 16px;
            stroke: white;
            fill: none;
            stroke-width: 2.5;
            stroke-linecap: round;
            stroke-linejoin: round;
            margin-left: 1px;
        }

        @media (max-width: 500px) {
            .header h1 { font-size: 30px; letter-spacing: 3px; }
            .chat-area { padding: 14px 10px; gap: 2px; }
            .bubble { font-size: 13px; padding: 9px 12px; }
            .bubble-wrapper { max-width: 85%; }
            .orb-wrapper { width: 80px; height: 80px; }
            .orb { width: 52px; height: 52px; }
            .quick-actions { padding: 6px 16px 12px; gap: 6px; }
            .quick-btn { padding: 5px 10px; font-size: 10px; }
            .input-area { padding: 8px 16px 16px; gap: 6px; }
            .input-area input { padding: 9px 14px; }
            .btn-send { width: 34px; height: 34px; }
            .btn-send svg { width: 14px; height: 14px; }
        }
    </style>
</head>
<body>
    <canvas id="starfield"></canvas>

    <div class="app-container">
        <div class="header">
            <h1>TITAN</h1>
            <div class="subtitle">voice assistant</div>
        </div>

        <div class="chat-area" id="chatArea"></div>

        <div class="orb-section">
            <div class="orb-wrapper">
                <div class="orb-ring"></div>
                <div class="orb-ring"></div>
                <div class="orb-ring"></div>
                <div class="orb" id="orb">
                    <div class="orb-dot" id="orbDot"></div>
                </div>
            </div>
            <div class="orb-label" id="orbLabel">Hold to Talk</div>
            <div class="orb-sublabel" id="orbSublabel">ready</div>
            <div class="meter">
                <div class="meter-fill" id="meterFill"></div>
            </div>
            <div class="speaking-indicator" id="speakingIndicator">speaking...</div>
        </div>

        <div class="quick-actions">
            <button class="quick-btn" onclick="quickSend('What time is it?')">Time</button>
            <button class="quick-btn" onclick="quickSend('What is today\'s date?')">Date</button>
            <button class="quick-btn" onclick="quickSend('Tell me something interesting')">Fact</button>
            <button class="quick-btn" onclick="quickSend('Help')">Help</button>
            <button class="quick-btn" onclick="clearChat()">Clear</button>
        </div>

        <div class="input-area">
            <input 
                type="text" 
                id="textInput" 
                placeholder="Message..." 
                autocomplete="off"
                onkeydown="if(event.key==='Enter')sendMessage()"
            >
            <button class="btn-send" id="sendBtn" onclick="sendMessage()">
                <svg viewBox="0 0 24 24">
                    <path d="M12 19V5M5 12l7-7 7 7"/>
                </svg>
            </button>
        </div>
    </div>

    <script>
        // Starfield
        (() => {
            const c = document.getElementById('starfield');
            const ctx = c.getContext('2d');
            let stars = [], w, h;

            function resize() { w = c.width = innerWidth; h = c.height = innerHeight; }
            function build() {
                stars = [];
                const n = Math.floor(w * h / 2000);
                for (let i = 0; i < n; i++) {
                    stars.push({
                        x: Math.random() * w, y: Math.random() * h,
                        r: Math.random() * 1 + 0.2,
                        s: Math.random() * 0.01 + 0.003,
                        o: Math.random() * Math.PI * 2,
                        a: Math.random() * 0.4 + 0.2
                    });
                }
            }
            function draw(t) {
                ctx.clearRect(0, 0, w, h);
                stars.forEach(s => {
                    const alpha = s.a + Math.sin(t * s.s + s.o) * 0.2;
                    ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(190,195,220,${Math.max(0.03, alpha)})`; ctx.fill();
                });
                requestAnimationFrame(draw);
            }
            resize(); build(); requestAnimationFrame(draw);
            addEventListener('resize', () => { resize(); build(); });
        })();

        // State
        let isProcessing = false, isRecording = false;
        let mediaRecorder, audioChunks = [], stream = null;
        let audioEl = null, pressTimer = null;
        let audioCtx, analyser, animFrame;
        let lastMessageTime = null, lastMessageType = null;

        // DOM
        const orb = document.getElementById('orb');
        const orbLabel = document.getElementById('orbLabel');
        const orbSublabel = document.getElementById('orbSublabel');
        const meterFill = document.getElementById('meterFill');
        const speakingIndicator = document.getElementById('speakingIndicator');
        const chatArea = document.getElementById('chatArea');
        const textInput = document.getElementById('textInput');
        const sendBtn = document.getElementById('sendBtn');

        function scrollDown() {
            chatArea.scrollTo({ top: chatArea.scrollHeight, behavior: 'smooth' });
        }

        function shouldShowTimeDivider() {
            if (!lastMessageTime) return true;
            return (Date.now() - lastMessageTime) / 60000 > 5;
        }

        function formatDividerTime() {
            const now = new Date();
            const today = new Date(); today.setHours(0, 0, 0, 0);
            const msgDate = new Date(lastMessageTime || now); msgDate.setHours(0, 0, 0, 0);
            const diffDays = Math.floor((today - msgDate) / 86400000);
            if (diffDays === 0) return 'Today';
            if (diffDays === 1) return 'Yesterday';
            return now.toLocaleDateString([], { weekday: 'long', month: 'short', day: 'numeric' });
        }

        function addTimeDivider() {
            const divider = document.createElement('div');
            divider.className = 'time-divider';
            divider.textContent = formatDividerTime();
            chatArea.appendChild(divider);
        }

        function addMsg(type, text) {
            if (!text || text === 'null' || text === 'undefined') text = '(empty response)';
            if (shouldShowTimeDivider() || type !== lastMessageType) addTimeDivider();

            const row = document.createElement('div');
            row.className = `message-row ${type}`;

            const wrapper = document.createElement('div');
            wrapper.className = 'bubble-wrapper';

            const bubble = document.createElement('div');
            bubble.className = 'bubble';
            bubble.textContent = text;

            const time = document.createElement('span');
            time.className = 'bubble-time';
            time.textContent = new Date().toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' });

            wrapper.appendChild(bubble);
            wrapper.appendChild(time);
            row.appendChild(wrapper);
            chatArea.appendChild(row);

            lastMessageTime = Date.now();
            lastMessageType = type;
            scrollDown();
        }

        function speak(text) {
            if (!text || text.length < 3) return;
            speakingIndicator.classList.add('active');

            fetch('/speak', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ text })
            })
            .then(r => r.ok ? r.blob() : Promise.reject())
            .then(blob => {
                if (blob.size < 100) throw new Error();
                const url = URL.createObjectURL(blob);
                if (audioEl) { audioEl.pause(); URL.revokeObjectURL(audioEl.src); }
                audioEl = new Audio(url);
                audioEl.onended = () => { 
                    speakingIndicator.classList.remove('active'); 
                    URL.revokeObjectURL(url); 
                };
                audioEl.onerror = () => { 
                    speakingIndicator.classList.remove('active'); 
                    URL.revokeObjectURL(url); 
                };
                audioEl.play().catch(() => speakingIndicator.classList.remove('active'));
            })
            .catch(() => speakingIndicator.classList.remove('active'));
        }

        function resetUI() {
            orb.classList.remove('active');
            orbLabel.textContent = 'Hold to Talk';
            orbLabel.classList.remove('active');
            orbSublabel.textContent = 'ready';
            orbSublabel.classList.remove('alert');
            meterFill.style.width = '0%';
            if (animFrame) { cancelAnimationFrame(animFrame); animFrame = null; }
        }

        async function startRecording() {
            if (isProcessing || isRecording) return;
            try {
                stream = await navigator.mediaDevices.getUserMedia({
                    audio: { sampleRate: 16000, channelCount: 1, echoCancellation: true, noiseSuppression: true }
                });
                isRecording = true;
                audioChunks = [];

                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                analyser = audioCtx.createAnalyser();
                analyser.fftSize = 256;
                const src = audioCtx.createMediaStreamSource(stream);
                src.connect(analyser);
                const dataArr = new Uint8Array(analyser.frequencyBinCount);

                const mime = MediaRecorder.isTypeSupported('audio/webm;codecs=opus') ? 'audio/webm;codecs=opus' : 'audio/webm';
                mediaRecorder = new MediaRecorder(stream, { mimeType: mime, audioBitsPerSecond: 16000 });

                mediaRecorder.ondataavailable = e => { if (e.data.size > 0) audioChunks.push(e.data); };
                mediaRecorder.onstop = () => {
                    if (audioChunks.length === 0) { resetUI(); return; }
                    orbSublabel.textContent = 'processing...';
                    orbSublabel.classList.add('alert');
                    const blob = new Blob(audioChunks, { type: 'audio/webm' });
                    const reader = new FileReader();
                    reader.onloadend = () => sendAudio(reader.result.split(',')[1]);
                    reader.readAsDataURL(blob);
                    if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
                    if (audioCtx) { audioCtx.close().catch(() => {}); audioCtx = null; analyser = null; }
                };

                mediaRecorder.start(250);

                function updateMeter() {
                    if (!isRecording || !analyser) return;
                    analyser.getByteFrequencyData(dataArr);
                    let sum = 0;
                    for (let i = 0; i < dataArr.length; i++) sum += dataArr[i];
                    meterFill.style.width = Math.min((sum / dataArr.length / 128) * 100, 100) + '%';
                    animFrame = requestAnimationFrame(updateMeter);
                }
                updateMeter();

                orb.classList.add('active');
                orbLabel.textContent = 'Listening';
                orbLabel.classList.add('active');
                orbSublabel.textContent = 'speak now';
                orbSublabel.classList.add('alert');

                setTimeout(() => { if (isRecording && mediaRecorder?.state === 'recording') stopRecording(); }, 7000);
            } catch (err) {
                console.error(err);
                orbSublabel.textContent = 'mic access needed';
                setTimeout(() => { orbSublabel.textContent = 'ready'; orbSublabel.classList.remove('alert'); }, 3000);
            }
        }

        function stopRecording() {
            if (mediaRecorder && mediaRecorder.state === 'recording') mediaRecorder.stop();
            isRecording = false;
            if (animFrame) { cancelAnimationFrame(animFrame); animFrame = null; }
        }

        async function sendAudio(b64) {
            try {
                const res = await fetch('/speech-to-text', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ audio: b64 })
                });
                const data = await res.json();
                if (data.text && data.text.trim()) {
                    textInput.value = data.text.trim();
                    orbSublabel.textContent = 'got it';
                    setTimeout(() => sendMessage(), 200);
                } else {
                    orbSublabel.textContent = 'try again';
                    setTimeout(() => { orbSublabel.textContent = 'ready'; orbSublabel.classList.remove('alert'); }, 2000);
                }
            } catch (err) {
                console.error(err);
                orbSublabel.textContent = 'error';
                addMsg('error', 'Connection error. Is the server running?');
                setTimeout(() => { orbSublabel.textContent = 'ready'; orbSublabel.classList.remove('alert'); }, 2000);
            } finally {
                resetUI();
            }
        }

        function sendMessage() {
            if (isProcessing) return;
            const msg = textInput.value.trim();
            if (!msg) return;
            textInput.value = '';
            isProcessing = true;
            sendBtn.disabled = true;
            orb.style.opacity = '0.4';
            orb.style.pointerEvents = 'none';

            addMsg('user', msg);
            orbSublabel.textContent = 'thinking...';
            orbSublabel.classList.add('alert');

            fetch('/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: msg })
            })
            .then(r => r.json())
            .then(data => {
                const text = data.response || '';
                if (data.type === 'system') addMsg('assistant', text || 'Done.');
                else if (data.type === 'error') addMsg('error', text || 'Error.');
                else addMsg('assistant', text || 'No response.');
                if (text && text.length > 3) setTimeout(() => speak(text), 400);
            })
            .catch(err => {
                console.error(err);
                addMsg('error', 'Could not reach server.');
            })
            .finally(() => {
                isProcessing = false;
                sendBtn.disabled = false;
                orb.style.opacity = '1';
                orb.style.pointerEvents = 'auto';
                orbSublabel.textContent = 'ready';
                orbSublabel.classList.remove('alert');
                textInput.focus();
            });
        }

        function quickSend(text) { textInput.value = text; sendMessage(); }

        function clearChat() { 
            chatArea.innerHTML = ''; 
            lastMessageTime = null; 
            lastMessageType = null; 
        }

        // Welcome
        addMsg('assistant', 'Hey there! Hold the orb to talk, or type a message below.');

        // Orb events
        orb.addEventListener('mousedown', e => {
            e.preventDefault();
            pressTimer = setTimeout(() => startRecording(), 180);
        });
        orb.addEventListener('mouseup', () => { clearTimeout(pressTimer); if (isRecording) stopRecording(); });
        orb.addEventListener('mouseleave', () => { clearTimeout(pressTimer); if (isRecording) stopRecording(); });
        orb.addEventListener('touchstart', e => {
            e.preventDefault();
            pressTimer = setTimeout(() => startRecording(), 180);
        }, { passive: false });
        orb.addEventListener('touchend', e => {
            e.preventDefault();
            clearTimeout(pressTimer);
            if (isRecording) stopRecording();
        }, { passive: false });
        orb.addEventListener('touchcancel', () => { clearTimeout(pressTimer); if (isRecording) stopRecording(); });

        // Keyboard shortcut
        document.addEventListener('keydown', e => {
            if (e.code === 'Space' && document.activeElement !== textInput && !isRecording && !isProcessing) {
                e.preventDefault(); startRecording();
            }
        });
        document.addEventListener('keyup', e => {
            if (e.code === 'Space' && isRecording) { e.preventDefault(); stopRecording(); }
        });

        // Init
        if (!navigator.mediaDevices?.getUserMedia) {
            orb.style.opacity = '0.3';
            orb.style.cursor = 'not-allowed';
            orbLabel.textContent = 'Unsupported';
            addMsg('assistant', 'Voice input isn\'t supported in this browser, but you can still type.');
        }
    </script>
</body>
</html>
